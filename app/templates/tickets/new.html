{% extends 'base.html' %}
{% block title %}Nuevo ticket{% endblock %}

{% block content %}
	<div class='row justify-content-center'>
		<div class='col-lg-8'>
			<h4 class='mb-4'>Abrir nuevo ticket</h4>

			<div class='card'>
				<div class='card-body'>
					<form method='POST'>
						<div class='mb-3'>
							<label class='form-label fw-semibold'>Asunto *</label>
							<input type='text' name='title' class='form-control' required placeholder='Describe brevemente el problema'>
						</div>

						<div class='row g-3'>
							<div class='col-md-4'>
								<label class='form-label fw-semibold'>Prioridad</label>
								<select name='priority' class='form-select'>
									<option value='low'>Baja</option>
									<option value='medium' selected>Media</option>
									<option value='high'>Alta</option>
									<option value='critical'>Crítica</option>
								</select>
							</div>

							<div class="col-md-4">
								<label class="form-label fw-semibold">Categoría</label>
								<select name="category" class="form-select" required>
									<option value="">-- Seleccionar --</option>
									<option value="SAGE X3">SAGE X3</option>
									<option value="Software">Software</option>
									<option value="Hardware">Hardware</option>
									<option value="Redes e internet">Redes e internet</option>
									<option value="EDI">EDI</option>
								</select>
							</div>

							{% if current_user.is_admin() %}
							<div class='col-md-4'>
								<label class='form-label fw-semibold'>Asignar a</label>
								<select name='assigned_to' class='form-select'>
									<option value=''>Sin asignar</option>
									{% for agent in agents %}
										<option value='{{ agent.id }}'>{{ agent.name }}</option>
									{% endfor %}
								</select>
							</div>
							{% endif %}
						</div>

						<div class='mb-3'>
							<label class='form-label fw-semibold'>Descripción detallada *</label>
							<textarea name='description' class='form-control' rows='5' required placeholder='Explica el problema con todo el detalle posible...'></textarea>
						</div>

						<div class="mb-3 mt-3">
							<label class="form-label fw-semibold">Participantes adicionales</label>
							<select name="participantes_ids" id="select-participantes-new"
									multiple class="form-select">
								{% for u in todos_usuarios %}
								<option value="{{ u.id }}">{{ u.name }}</option>
								{% endfor %}
							</select>
							<div class="form-text">Selecciona las personas que deben seguir este ticket desde el inicio.</div>
						</div>

						<div class='mt-4 d-flex gap-2'>
							<button type='submit' class='btn btn-primary'>Crear ticket</button>
							<a href='{{ url_for("tickets.list_tickets") }}' class='btn btn-secondary'>Cancelar</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
	new TomSelect('#select-participantes-new', {
		plugins: ['remove_button'],
		placeholder: 'Buscar y añadir participantes...',
		maxOptions: 100,
	});
</script>

{% endblock %}
